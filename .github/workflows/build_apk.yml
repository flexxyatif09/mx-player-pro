name: Build & Sign MX Player APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Create Required Directories
        run: |
          mkdir -p assets/images assets/icons assets/animations assets/fonts

      - name: Build Debug APK
        run: flutter build apk --debug --target-platform android-arm,android-arm64

      - name: Build Release APK
        run: flutter build apk --release --target-platform android-arm,android-arm64

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MXPlayerPro-Debug-v${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: MXPlayerPro-Release-v${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

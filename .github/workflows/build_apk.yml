name: Build & Sign MX Player APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Create Fresh Flutter Project
        run: flutter create --org com.mxplayer --project-name mx_player_pro fresh_app

      - name: Copy Our Source Files
        run: |
          rm -rf fresh_app/lib
          cp -r lib fresh_app/lib
          mkdir -p fresh_app/assets/images
          mkdir -p fresh_app/assets/icons
          mkdir -p fresh_app/assets/animations

      - name: Set Minimal pubspec
        working-directory: fresh_app
        run: |
          cat > pubspec.yaml << 'PUBSPEC'
          name: mx_player_pro
          description: MX Player Clone
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            video_player: ^2.8.2
            chewie: ^1.7.4
            permission_handler: ^11.1.0
            path_provider: ^2.1.2
            path: ^1.9.0
            hive: ^2.2.3
            hive_flutter: ^1.1.0
            shared_preferences: ^2.2.2
            shimmer: ^3.0.0
            google_fonts: ^6.1.0
            provider: ^6.1.1
            get: ^4.6.6
            share_plus: ^7.2.2
            wakelock_plus: ^1.1.4
            cached_network_image: ^3.3.1
            lottie: ^2.7.0
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          flutter:
            uses-material-design: true
            assets:
              - assets/images/
              - assets/icons/
              - assets/animations/
          PUBSPEC

      - name: Get Dependencies
        working-directory: fresh_app
        run: flutter pub get

      - name: Build Debug APK
        working-directory: fresh_app
        run: flutter build apk --debug --target-platform android-arm,android-arm64

      - name: Build Release APK
        working-directory: fresh_app
        run: flutter build apk --release --target-platform android-arm,android-arm64

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MXPlayerPro-Debug-v${{ github.run_number }}
          path: fresh_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: MXPlayerPro-Release-v${{ github.run_number }}
          path: fresh_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

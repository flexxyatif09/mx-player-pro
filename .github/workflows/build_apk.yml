name: Build FlexX Player APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Create Fresh Flutter Project
        run: flutter create --org com.flexx --project-name flexx_player fresh_app

      - name: Copy Source Files
        run: |
          rm -rf fresh_app/lib
          cp -r lib fresh_app/lib
          mkdir -p fresh_app/assets/images
          mkdir -p fresh_app/assets/icons
          mkdir -p fresh_app/assets/animations

      - name: Write pubspec.yaml
        run: |
          cat > fresh_app/pubspec.yaml << 'EOF'
          name: flexx_player
          description: FlexX Player - Professional Video Player
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            video_player: ^2.8.2
            chewie: ^1.7.4
            permission_handler: ^11.1.0
            path_provider: ^2.1.2
            path: ^1.9.0
            hive: ^2.2.3
            hive_flutter: ^1.1.0
            shared_preferences: ^2.2.2
            google_fonts: ^6.1.0
            provider: ^6.1.1
            get: ^4.6.6
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          flutter:
            uses-material-design: true
            assets:
              - assets/images/
              - assets/icons/
              - assets/animations/
          EOF

      - name: Write AndroidManifest
        run: |
          cat > fresh_app/android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <application
                  android:label="FlexX Player"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:requestLegacyExternalStorage="true"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize"
                      android:screenOrientation="sensor">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                      <intent-filter>
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                          <data android:mimeType="video/*"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>
          EOF

      - name: Set App Icons
        run: |
          echo "" | base64 -d > fresh_app/android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          echo "" | base64 -d > fresh_app/android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          echo "" | base64 -d > fresh_app/android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          echo "" | base64 -d > fresh_app/android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          echo "" | base64 -d > fresh_app/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Fix Kotlin Version
        working-directory: fresh_app
        run: |
          sed -i "s/ext.kotlin_version = '1.7.10'/ext.kotlin_version = '1.8.22'/" android/build.gradle
          sed -i "s/ext.kotlin_version = '1.8.0'/ext.kotlin_version = '1.8.22'/" android/build.gradle
          sed -i "s/ext.kotlin_version = '1.9.0'/ext.kotlin_version = '1.8.22'/" android/build.gradle

      - name: Get Dependencies
        working-directory: fresh_app
        run: flutter pub get

      - name: Build Debug APK
        working-directory: fresh_app
        run: flutter build apk --debug --target-platform android-arm,android-arm64

      - name: Build Release APK
        working-directory: fresh_app
        run: flutter build apk --release --target-platform android-arm,android-arm64

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FlexxPlayer-Debug-v${{ github.run_number }}
          path: fresh_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: FlexxPlayer-Release-v${{ github.run_number }}
          path: fresh_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

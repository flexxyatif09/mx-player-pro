name: mx_player_pro
description: Professional Video Player - MX Player Clone

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Video Player
  video_player: ^2.8.2
  chewie: ^1.7.4

  # Media & Files
  file_picker: ^6.1.1
  permission_handler: ^11.1.0
  path_provider: ^2.1.2
  path: ^1.9.0

  # Database & Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # UI
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  percent_indicator: ^4.2.3
  flutter_rating_bar: ^4.0.1
  sliding_up_panel: ^2.0.0+1

  # Gesture & Controls
  wakelock_plus: ^1.1.4

  # Icons & Fonts
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # Misc
  provider: ^6.1.1
  get: ^4.6.6
  intl: ^0.19.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.2
  device_info_plus: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
